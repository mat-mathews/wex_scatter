site_name: "Scatter // Athena"
site_description: ".NET dependency graph engine — trace blast radius before you ship"
use_directory_urls: false

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - tables
  - attr_list

nav:
  - User Guide:
      - Home: index.md
      - Getting Started: getting-started.md
      - Quick Tour: quick-tour.md
      - Target Project Analysis: usage/target-project.md
      - Git Branch Analysis: usage/git-branch.md
      - Stored Procedure Analysis: usage/stored-procedure.md
      - Impact Analysis: usage/impact-analysis.md
      - Dependency Graph: usage/dependency-graph.md
      - Output Formats: output-formats.md
      - Workflows: workflows.md
      - AI Features: ai-features.md
      - Configuration: configuration.md
      - CLI Reference: cli-reference.md
      - Testing: testing.md
  - Technical Reference:
      - Architecture Overview: reference/architecture.md
      - Graph Engine: reference/graph-engine.md
      - Incremental Updates: reference/incremental-updates.md
      - Coupling & Cycle Detection: reference/coupling-and-cycles.md
      - Domain Clustering: reference/domain-clustering.md
      - Consumer Detection Pipeline: reference/consumer-pipeline.md
      - Type Extraction: reference/type-extraction.md
      - Test Architecture: reference/test-architecture.md
      - Benchmarks: reference/benchmarks.md
      - Sample Projects: reference/sample-projects.md
      - GitHub Action: reference/github-action.md
      - Development: reference/development.md
      - Contributing: reference/contributing.md
      - Claude Code Skills: reference/claude-skills.md
