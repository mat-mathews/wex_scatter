# Scatter Impact Analysis — GitHub Actions workflow template
#
# Copy this file into your .NET repo at: .github/workflows/scatter-impact.yml
# No marketplace action to install, no org approvals needed.
#
# What it does:
#   On every PR to main, runs scatter's git branch analysis against the PR's
#   changes, then posts the impact report as a PR comment.
#
# Requirements:
#   - The scatter repo must be accessible to the runner (public, or use a PAT)
#   - The .NET repo must have .csproj files discoverable from the repo root
#
# Optional:
#   - Set GOOGLE_API_KEY secret for AI-enriched risk ratings and narratives
#   - Add a .scatter.yaml for project-specific configuration
#   - Set SCATTER_REF to pin a specific scatter version (default: main)

name: Scatter Impact Analysis

on:
  pull_request:
    branches: [main]
    # Only run when .NET source files change
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.sln'

# Cancel in-progress runs for the same PR
concurrency:
  group: scatter-impact-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  impact:
    runs-on: ubuntu-latest
    # Skip if PR has no .cs/.csproj changes (belt + suspenders with paths filter)
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write  # needed for gh pr comment

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for branch diff

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install Scatter
        run: |
          git clone --depth 1 --branch ${SCATTER_REF:-main} \
            https://github.com/mat-mathews/wex_scatter.git /tmp/scatter
          cd /tmp/scatter && uv sync --quiet
        env:
          SCATTER_REF: ${{ vars.SCATTER_REF || 'main' }}

      - name: Run impact analysis
        id: analyze
        run: |
          uv run --project /tmp/scatter scatter \
            --branch-name "${{ github.head_ref }}" \
            --base-branch "${{ github.base_ref }}" \
            --repo-path . \
            --search-scope . \
            --output-format markdown \
            --output-file /tmp/impact-report.md \
            2>/tmp/scatter-stderr.log
          EXIT_CODE=$?

          # Check if report was generated
          if [ -f /tmp/impact-report.md ] && [ -s /tmp/impact-report.md ]; then
            echo "has_report=true" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "has_report=false" >> "$GITHUB_OUTPUT"
            echo "::error::Scatter failed with exit code $EXIT_CODE"
            cat /tmp/scatter-stderr.log || true
          else
            echo "has_report=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Scatter did not produce an impact report. PR may not affect .NET dependencies."
          fi
        # Scatter reads GOOGLE_API_KEY from environment automatically
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Comment on PR
        if: steps.analyze.outputs.has_report == 'true'
        run: |
          # Add footer to report
          echo "" >> /tmp/impact-report.md
          echo "---" >> /tmp/impact-report.md
          echo "*Auto-generated by [Scatter](https://github.com/mat-mathews/wex_scatter) on $(date -u +%Y-%m-%dT%H:%M:%SZ)*" >> /tmp/impact-report.md

          # Update existing comment or create new one
          COMMENT_TAG="<!-- scatter-impact -->"
          BODY="${COMMENT_TAG}
          $(cat /tmp/impact-report.md)"

          # Check for existing scatter comment
          EXISTING=$(gh pr view "${{ github.event.number }}" \
            --json comments \
            --jq '.comments[] | select(.body | startswith("<!-- scatter-impact -->")) | .id' \
            2>/dev/null | head -1)

          if [ -n "$EXISTING" ]; then
            # Update existing comment
            gh api repos/${{ github.repository }}/issues/comments/${EXISTING} \
              -X PATCH -f body="$BODY"
            echo "Updated existing scatter comment"
          else
            # Create new comment
            gh pr comment "${{ github.event.number }}" --body "$BODY"
            echo "Posted new scatter comment"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No impact detected
        if: steps.analyze.outputs.has_report != 'true'
        run: echo "No impact report generated — PR may not affect .NET dependencies."
