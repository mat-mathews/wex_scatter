# Scatter PR Risk Scoring — GitHub Actions workflow template
#
# Copy this file into your .NET repo at: .github/workflows/scatter-pr-risk.yml
# No marketplace action to install, no org approvals needed.
#
# What it does:
#   On every PR to main, runs scatter's PR risk analysis against the PR's
#   changes, then posts the risk score as a PR comment with collapsible details.
#
# Requirements:
#   - The scatter repo must be accessible to the runner (public, or use a PAT)
#   - The .NET repo must have .csproj files discoverable from the repo root
#
# Optional:
#   - Set GOOGLE_API_KEY secret for AI-enriched risk ratings and narratives
#   - Add a .scatter.yaml for project-specific configuration
#   - Set SCATTER_REF to pin a specific scatter version (default: main)

# TODO: Replace git clone with pip install when scatter is published to PyPI

name: Scatter PR Risk

on:
  pull_request:
    branches: [main]
    # Only run when .NET source files change
    paths:
      - '**/*.cs'
      - '**/*.csproj'
      - '**/*.sln'

# Cancel in-progress runs for the same PR
concurrency:
  group: scatter-pr-risk-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  pr-risk:
    runs-on: ubuntu-latest
    # Skip draft PRs
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write  # needed for gh pr comment

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for branch diff

      - name: Ensure branch refs exist locally
        run: |
          git fetch origin "${{ github.base_ref }}:${{ github.base_ref }}" || true
          git fetch origin "${{ github.head_ref }}:${{ github.head_ref }}" || true

      - name: Cache scatter graph
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: .scatter/
          key: scatter-graph-${{ hashFiles('**/*.csproj') }}
          restore-keys: scatter-graph-

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: false

      - name: Install Scatter
        run: |
          # TODO: Replace git clone with pip install when scatter is published
          git clone --depth 1 --branch ${SCATTER_REF:-main} \
            https://github.com/mat-mathews/wex_scatter.git /tmp/scatter
          cd /tmp/scatter && uv sync --quiet
        env:
          SCATTER_REF: ${{ vars.SCATTER_REF || 'main' }}

      - name: Run PR risk analysis
        id: analyze
        run: |
          START_TIME=$(date +%s)
          set +e
          # Redirect stderr to file (not tee) so $? captures the real exit code.
          # With tee, PIPESTATUS[0] is needed and is fragile across shells.
          uv run --project /tmp/scatter scatter \
            --pr-risk \
            --branch-name "${{ github.head_ref }}" \
            --base-branch "${{ github.base_ref }}" \
            --repo-path . --search-scope . \
            --graph-metrics --collapsible \
            --output-format markdown \
            --output-file /tmp/pr-risk-report.md \
            2>/tmp/scatter-stderr.log
          EXIT_CODE=$?
          set -e

          END_TIME=$(date +%s)
          WALL_CLOCK=$((END_TIME - START_TIME))
          echo "Wall clock: ${WALL_CLOCK}s"
          echo "wall_clock=${WALL_CLOCK}" >> "$GITHUB_OUTPUT"

          # Always show stderr for debugging
          if [ -s /tmp/scatter-stderr.log ]; then
            echo "--- Scatter stderr ---"
            cat /tmp/scatter-stderr.log
          fi
          echo "--- Scatter exit code: $EXIT_CODE ---"

          # Three-way output decision
          if [ $EXIT_CODE -eq 0 ] && [ -f /tmp/pr-risk-report.md ] && [ -s /tmp/pr-risk-report.md ]; then
            echo "has_report=true" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "has_report=false" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            echo "::error::Scatter failed with exit code $EXIT_CODE"
          else
            echo "has_report=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No C# type changes detected — skipping PR comment."
          fi
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Comment on PR — risk report
        if: steps.analyze.outputs.has_report == 'true'
        run: |
          # Add footer to report
          echo "" >> /tmp/pr-risk-report.md
          echo "---" >> /tmp/pr-risk-report.md
          echo "*Auto-generated by [Scatter](https://github.com/mat-mathews/wex_scatter) on $(date -u +%Y-%m-%dT%H:%M:%SZ)*" >> /tmp/pr-risk-report.md

          # Update existing comment or create new one
          COMMENT_TAG="<!-- scatter-pr-risk -->"
          BODY="${COMMENT_TAG}
          $(cat /tmp/pr-risk-report.md)"

          EXISTING=$(gh api repos/${{ github.repository }}/issues/${{ github.event.number }}/comments \
            --jq '.[] | select(.body | startswith("<!-- scatter-pr-risk -->")) | .id' \
            2>/dev/null | head -1)

          if [ -n "$EXISTING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${EXISTING} \
              -X PATCH -f body="$BODY"
            echo "Updated existing scatter PR risk comment"
          else
            gh pr comment "${{ github.event.number }}" --body "$BODY"
            echo "Posted new scatter PR risk comment"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR — analysis failed
        if: steps.analyze.outputs.failed == 'true'
        run: |
          COMMENT_TAG="<!-- scatter-pr-risk -->"
          LOGS_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="${COMMENT_TAG}
          ## Scatter Risk: Analysis failed

          > **Does not block merge.** Scatter encountered an error during analysis.
          > Check the [workflow logs](${LOGS_URL}) for details.

          ---
          *Auto-generated by [Scatter](https://github.com/mat-mathews/wex_scatter) on $(date -u +%Y-%m-%dT%H:%M:%SZ)*"

          EXISTING=$(gh api repos/${{ github.repository }}/issues/${{ github.event.number }}/comments \
            --jq '.[] | select(.body | startswith("<!-- scatter-pr-risk -->")) | .id' \
            2>/dev/null | head -1)

          if [ -n "$EXISTING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${EXISTING} \
              -X PATCH -f body="$BODY"
            echo "Updated existing scatter PR risk comment (failure)"
          else
            gh pr comment "${{ github.event.number }}" --body "$BODY"
            echo "Posted scatter PR risk failure comment"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
